name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore dependencies
        run: dotnet restore F95GameManager.sln

      - name: Build
        run: dotnet build F95GameManager.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test F95GameManager.sln --no-build --configuration Release --verbosity normal
