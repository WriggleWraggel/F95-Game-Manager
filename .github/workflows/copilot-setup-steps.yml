name: "Copilot Setup Steps"

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
          cache: true
          cache-dependency-path: '**/Directory.Packages.props'

      - name: Restore dependencies
        run: |
          dotnet restore GameManager.Core.Tests/GameManager.Core.Tests.csproj
          dotnet restore GameManager.UI.Tests/GameManager.UI.Tests.csproj

      - name: Build
        run: |
          dotnet build GameManager.Core.Tests/GameManager.Core.Tests.csproj --no-restore --configuration Release
          dotnet build GameManager.UI.Tests/GameManager.UI.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: |
          dotnet test GameManager.Core.Tests/GameManager.Core.Tests.csproj --no-build --configuration Release
          dotnet test GameManager.UI.Tests/GameManager.UI.Tests.csproj --no-build --configuration Release
