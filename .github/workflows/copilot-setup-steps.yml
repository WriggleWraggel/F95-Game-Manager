name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed
# Allows for streamlined validation,
# and allow manual testing through the repository's "Actions" tab

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps`
  # otherwise it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # Permissions set just for the setup steps
    # Copilot has permissions to its branch
    permissions:
      # To allow us to clone the repo for setup
      contents: read

    # The setup steps
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: install dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x
          cache: true
      
      - name: restore
        run: |
          dotnet restore GameManager.Core/GameManager.Core.csproj
          dotnet restore GameManager.UI/GameManager.UI.csproj
          dotnet restore GameManager.Core.Tests/GameManager.Core.Tests.csproj

      - name: build
        run: |
          dotnet build GameManager.Core/GameManager.Core.csproj --no-restore
          dotnet build GameManager.UI/GameManager.UI.csproj --no-restore
          dotnet build GameManager.Core.Tests/GameManager.Core.Tests.csproj --no-restore