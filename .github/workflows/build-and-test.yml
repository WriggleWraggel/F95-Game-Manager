name: Build and Test

on:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Restore dependencies
        run: dotnet restore GameManager.Core.Tests/GameManager.Core.Tests.csproj

      - name: Build
        run: dotnet build GameManager.Core.Tests/GameManager.Core.Tests.csproj --no-restore

      - name: Test
        run: dotnet test GameManager.Core.Tests/GameManager.Core.Tests.csproj --no-build --verbosity normal
